services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready zookeeper:2181 30"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka1:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:29092
      interval: 10s
      timeout: 10s
      retries: 10

  kafka2:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:29092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:29092
      interval: 10s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka1:29092,kafka2:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: curl -f http://localhost:8081/subjects || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka1:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - ./proto:/proto
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        chmod +x /scripts/*.sh
        /scripts/create-topics.sh
        /scripts/register-schema.sh
    environment:
      KAFKA_BROKER: kafka1:29092,kafka2:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PROTO_FILE: /proto/movie_event.proto
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: app
      CLICKHOUSE_PASSWORD: app
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./proto:/var/lib/clickhouse/format_schemas
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: wget -qO- http://localhost:8123/ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse-init:
    image: curlimages/curl:8.5.0
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/init-clickhouse.sh"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: app
      CLICKHOUSE_PASSWORD: app
    restart: "no"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"
      - "9002:9000"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb -p local/movie-analytics || true
    restart: "no"

  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8090:8090"
    environment:
      AGG_HTTP_PORT: "8090"
      AGG_INTERVAL: "30s"
      EXPORT_INTERVAL: "24h"
      EXPORT_MAX_RETRIES: "3"
      CLICKHOUSE_DSN: clickhouse://app:app@clickhouse:9000/default
      POSTGRES_DSN: postgres://app:app@postgres:5432/analytics?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: movie-analytics
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      S3_PREFIX: daily
    healthcheck:
      test: wget -qO- http://localhost:8090/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: wget -qO- http://localhost:3000/api/health | grep -q ok
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./proto:/proto:ro
    environment:
      KAFKA_BROKERS: kafka1:29092,kafka2:29092
      KAFKA_TOPIC: movie-events
      KAFKA_MAX_RETRIES: "5"
      KAFKA_INITIAL_BACKOFF: "100ms"
      KAFKA_MAX_BACKOFF: "2s"
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PROTO_FILE_PATH: /proto/movie_event.proto
      HTTP_PORT: "8080"
      MODE: both
      GENERATOR_ENABLED: "true"
      GENERATOR_RATE_MS: "500"
      GENERATOR_NUM_USERS: "100"
      GENERATOR_NUM_MOVIES: "50"
    healthcheck:
      test: wget -qO- http://localhost:8080/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  clickhouse-data:
  postgres-data:
  minio-data:
